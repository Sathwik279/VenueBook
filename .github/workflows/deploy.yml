# 🚀 Google Cloud Run Deployment: CI/CD Pipeline
# --------------------------------------------------------
# This workflow automatically builds and deploys your Java backend to GCP on every push to main.

name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main # Change this to your default branch if different

env:
  # // UPDATE THESE: Replace with the values you provided in setup-gcp.sh
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE_NAME: backend-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Speeds up build significantly

    - name: 🔐 Authenticate to Google Cloud
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        # // PREREQUISITE: Contents of 'gcp-key.json' must be in GitHub Secret: GCP_SA_KEY
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 🛠️ Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 🐳 Configure Docker for Artifact Registry
      run: |-
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: 🧱 Build and Push Docker Image
      run: |-
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }}

    - name: 🚀 Deploy to Cloud Run
      id: deploy
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }}
        # 🧪 Environment Variables (Injected from GitHub Secrets)
        # These will be used by application-prod.properties 
        env_vars: |
          TIDB_HOST=${{ secrets.TIDB_HOST }}
          TIDB_USER=${{ secrets.TIDB_USER }}
          TIDB_PASSWORD=${{ secrets.TIDB_PASSWORD }}
          TIDB_DB=${{ secrets.TIDB_DB }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          SPRING_PROFILES_ACTIVE=prod



    - name: 🏁 Final Success Check
      run: |-
        echo "🚀 Successfully deployed to: ${{ steps.deploy.outputs.url }}"
