# 🚀 Google Cloud Run Deployment: CI/CD Pipeline (Monorepo Optimized)
# ------------------------------------------------------------------
# Place this file at: .github/workflows/deploy.yml (at the Root of your Repo)

name: Deploy to Google Cloud Run

on:
  # 🎯 Manual Trigger: Go to 'Actions' tab and click 'Run workflow'
  workflow_dispatch:
  
  # 🎯 Deploy only when you're ready (manually or on merge to main)
  push:
    branches:
      - main 
    paths:
      - 'backend/**'

env:
  # // UPDATE THESE: Replace with the values you provided in setup-gcp.sh
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE_NAME: backend-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # 🏠 Automatically runs every command inside the /backend folder
    defaults:
      run:
        working-directory: backend

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Speeds up build significantly

    - name: 🔐 Authenticate to Google Cloud
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        # // PREREQUISITE: Contents of 'gcp-key.json' must be in GitHub Secret: GCP_SA_KEY
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 🛠️ Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 🐳 Configure Docker for Artifact Registry
      run: |-
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: 🧱 Build and Push Docker Image
      run: |-
        # 'docker build' will now correctly use the /backend folder
        docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }}

    - name: 🚀 Deploy to Cloud Run
      id: deploy
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/backend/${{ env.SERVICE_NAME }}:${{ github.sha }}
        # Pass essential secrets only
        env_vars: |
          SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.TIDB_HOST }}:4000/easyvenue?useSSL=true&verifyServerCertificate=true&trustCertificateKeyStoreUrl=file:/app/certs/truststore.jks&trustCertificateKeyStorePassword=changeit
          SPRING_DATASOURCE_USERNAME=${{ secrets.TIDB_USER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.TIDB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS=http://localhost:5173,https://venuebook-716a0.web.app

    - name: 🏁 Final Success Check
      run: |-
        echo "🚀 Successfully deployed to: ${{ steps.deploy.outputs.url }}"
