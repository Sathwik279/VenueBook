# 🚀 VenueBook Configuration (Restored)
# --------------------------------------------------------

# Database Connection (Cloud-Ready with Local Fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/easyvenue}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:6116}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=${PORT:8080}

# CORS Configuration (Dynamic)
spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# JWT Configuration
jwt.secret=${JWT_SECRET:EasyVenueSecretKeyForJwtTokenSigningMustBeAtLeast32CharactersLongToAvoidWeakKeyException}
jwt.expiration-ms=86400000
